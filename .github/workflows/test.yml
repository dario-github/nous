name: Nous CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest（Python ${{ matrix.python-version }}）
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pycozo cozo-embedded pandas pyyaml pydantic watchfiles
          pip install pytest pytest-cov ruff

      - name: Ruff 语法检查
        run: |
          ruff check src/ tests/ || true

      - name: 运行 pytest
        run: |
          pytest tests/ -v --tb=short --cov=src/nous --cov-report=term-missing

      - name: Schema 完整性检查
        run: |
          python -c "
          import yaml, pathlib
          schema_dir = pathlib.Path('nous/ontology/schema')
          for f in ['entities.yaml', 'relations.yaml', 'constraints.yaml']:
              data = yaml.safe_load((schema_dir / f).read_text())
              assert 'version' in data, f'{f} 缺少 version 字段'
              print(f'  ✅ {f} OK')
          version = (schema_dir / 'VERSION').read_text().strip()
          print(f'  📌 Schema VERSION: {version}')
          " || true
