name: Nous CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest（Python ${{ matrix.python-version }}）
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          # Core: pycozo client + cozo-embedded (Rust backend) + LSVJ Lark parser
          pip install "pycozo[embedded]" pyyaml pydantic watchfiles lark
          pip install pytest pytest-cov ruff

      - name: Ruff 语法检查
        run: |
          ruff check src/ tests/ || true

      - name: 运行 pytest（公共 CI 子集）
        # 公共仓库 CI 仅运行不依赖 cozo_embedded 后端 + 不依赖私有 memory/entities/
        # 种子的测试（cozo 在 GitHub Linux runner 上 ABI 偶发 segfault；entities
        # 目录是作者私有 KG 的 dump，已在公开 release 中 anonymise 抽走）。完整套件
        # 在已配置 cozo + entities seed 的开发机上仍可跑。
        run: |
          pytest tests/lsvj/ \
                 tests/test_scallop_sidecar.py \
                 tests/test_gateway_hook.py \
                 -v --tb=short

      - name: Schema 完整性检查
        run: |
          python -c "
          import yaml, pathlib
          schema_dir = pathlib.Path('nous/ontology/schema')
          for f in ['entities.yaml', 'relations.yaml', 'constraints.yaml']:
              data = yaml.safe_load((schema_dir / f).read_text())
              assert 'version' in data, f'{f} 缺少 version 字段'
              print(f'  ✅ {f} OK')
          version = (schema_dir / 'VERSION').read_text().strip()
          print(f'  📌 Schema VERSION: {version}')
          " || true
