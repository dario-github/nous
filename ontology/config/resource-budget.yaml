# Resource budget for Nous gate pipeline
# timeout_us: raised to 30s to accommodate semantic gate LLM calls
gate_budgets:
  max_query_depth: 5
  max_entities_scanned: 200
  delegate_token_budget: 512
  timeout_us: 60000000  # 60 seconds — raised to let Shadow data flow (KG 482 entities)
enforcement: warn
