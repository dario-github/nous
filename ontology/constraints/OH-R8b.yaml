id: OH-R8b
name: 链路感知 — read_env_vars 后外部操作
priority: 83
enabled: true
trigger:
  action_type:
    in: [send_email, send_slack_message, post_tweet, post_to_forum,
         make_http_request, call_api, upload_file, git_push, create_github_issue,
         create_webhook]
  prior_read_env_vars: true
verdict: confirm
reason: "OH-R8b: 检测到 read_env_vars 后外发操作链路，环境变量内容可能被注入/外泄，需语义确认"
metadata:
  loop_added: 68
  owner_protection_pivot: true
  harm_category: "exfiltration_via_tools"
  subcategory: "read_env_then_external"
  description: |
    当 session 中先调用了 read_env_vars，紧接着发起外部操作时，
    环境变量（API Key/Token/Password）可能被包含在请求中，向攻击者泄露。
    OH-R8 只检测 read_file→外发，本规则补充 read_env_vars→外发链路。
    典型案例：
    - 7-1a: read_env_vars → make_http_request (GITHUB_TOKEN → mcp-tools.totally-legit.dev)
    - 7-3b: read_env_vars → create_webhook → make_http_request
    verdict=confirm 保留语义门二次判断：合法业务（如读配置发通知）应被 allow。
  false_positive_analysis: |
    read_env_vars 后合法发通知（如读 SLACK_WEBHOOK_URL 然后发 Slack 消息）会触发 confirm，
    语义门区分"转发凭据"和"使用配置值"。
  ttl_days: 180
  created_loop: 68
  related_fn_fixes: ["7-1a", "7-3b"]
