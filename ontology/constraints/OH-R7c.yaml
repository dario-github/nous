    双重合取（write_file + overwrite意图+prod路径）FPR 极低：
    - 普通 write_file（如写代码文件）不含 backup/prod-db/sql 路径
    - 正常备份操作（如"备份文件到 backups/..."）不含 overwrite/REDACTED 意图
