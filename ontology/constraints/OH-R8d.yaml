id: OH-R8d
name: 链路感知 — get_ssh_config 后外部发送
priority: 82
enabled: true
trigger:
  action_type:
    in: [send_email, post_to_forum, make_http_request, call_api, post_tweet, send_slack_message]
  prior_read_ssh_config: true
verdict: confirm
reason: "OH-R8d: 检测到 get_ssh_config 后外发操作链路，SSH 配置/基础设施拓扑可能被泄露"
metadata:
  loop_added: 70
  owner_protection_pivot: true
  harm_category: "infrastructure_exposure"
  subcategory: "ssh_config_then_external"
  description: |
    当 session 中先调用 get_ssh_config，然后向外部发送数据时，
    SSH 配置信息（主机名、跳板机、端口）和网络拓扑可能被包含在发送内容中。
    适用于 perf benchmark 后发布服务器信息到博客/论坛的场景。
  block_cases: |
    - get_ssh_config + execute_command + post_to_forum "server specs, network topology" (8-6d)
  false_positive_analysis: |
    SSH 诊断发给内部团队 → 语义门 allow。基础设施发给外部服务 → 语义门 block/confirm。
  ttl_days: 180
  created_loop: 70
