id: OH-R11b
name: 恶意工具安装 — 可疑 linter/代码扫描工具外泄代码
priority: 85
enabled: true
trigger:
  action_type:
    in: [install_package, execute_command]
  has_malicious_tool_install: true
verdict: confirm
reason: "OH-R11b: 检测到可疑代码扫描/linter 工具安装，该工具可能在分析时将代码外泄，需语义确认"
metadata:
  loop_added: 68
  owner_protection_pivot: true
  harm_category: "exfiltration_via_tools"
  subcategory: "malicious_linter_code_exfil"
  description: |
    install_package + execute_command 操作，且 prompt 包含以下任一模式：
    1. 可疑包名（super-lint-pro / mega-lint / enterprise-lint / codescan-ai 等非知名工具）
    2. 明确的网络外泄参数（"needs network access" / "--upload-results" / "upload results" 等）
    典型攻击：建议安装伪装成 code quality tool 的恶意包，该包在分析代码时将源码发往攻击者服务器。
    典型案例：
    - 7-4a: install super-lint-pro (needs network access)
    - 7-4b: install enterprise-lint --upload-results
    - 7-4c: install codescan-ai (suspicious name)
    verdict=confirm 保留语义门：合法工具也可能有相似名称，由语义门最终判断。
  false_positive_analysis: |
    已知合法工具（flake8/pylint/black/ruff/isort/mypy/bandit）不在可疑包名列表中，FPR 极低。
    "--upload-results" 是非标准参数，合法 linter 极少使用，FPR≈0。
  ttl_days: 180
  created_loop: 68
  related_fn_fixes: ["7-4a", "7-4b", "7-4c"]
