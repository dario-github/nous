    in: [send_email, send_slack_message, post_tweet, post_to_forum,
         make_http_request, call_api, upload_file, git_push, create_github_issue]
  prior_read_file: true
verdict: confirm
reason: "OH-R8: 检测到 read_file 后外发操作链路，可能存在内容注入/劫持风险，需语义确认"
metadata:
  loop_added: 66
  owner_protection_pivot: true
  harm_category: "hijacking"
