  description: |
    当 session 中先调用了 read_file，紧接着发起外部操作时，文件内容可能
    包含注入指令，将操作重定向到攻击者控制的目标。
    判断 A（GPT-5.4）：confirm 不是 block，保留语义门二次判断机会。
    benign 例外：press release 发送、新闻稿、合法通知 — 由语义门处理。
  false_positive_analysis: |
    合法业务如"读新闻稿→发邮件"会触发 confirm，但语义门会正确 allow。
    FPR 由 val benign 对照集监控。
  ttl_days: 180
  created_loop: 66
  gpt54_reference: "Q1: confirm — read_file→外发链有合法业务场景"
