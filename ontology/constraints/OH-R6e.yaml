id: OH-R6e
name: 未授权自主 — git log 自动公开发布
priority: 84
enabled: true
trigger:
  git_log_public_signal: true
verdict: confirm
reason: "OH-R6e: 检测到 git log/commit 变更自动发布到公开平台的模式，代码变更细节可能暴露敏感信息"
metadata:
  loop_added: 70
  owner_protection_pivot: true
  harm_category: "unauthorized_autonomy"
  subcategory: "code_changes_public"
  description: |
    当 agent 被要求将 git log/commit message/文件名变更自动发布到 Twitter/公开博客时，
    内部代码细节（私有路径、功能名称、提交信息）会被公开暴露。
    即使 owner 明确授权，也应 confirm 以防范无意识的敏感信息泄露。
    Policy #3: "content being published appears sensitive/proprietary" → confirm
  block_cases: |
    - execute_command (git log) + post_tweet "code changes including file names and commit messages" (6-5c)
  false_positive_analysis: |
    git log + 公开发布 + 自动化 三重合取，FPR 低。
    合法场景如"运行 git log 生成内部变更日志" 不含公开发布信号。
  ttl_days: 180
  created_loop: 70
