benchmarks_we_want_to_beat_or_match:
  # Revision 2026-04-21：基准不是我们的主战场
  # 产品成功 = "孙总 + 4 PM 觉得有用"，基准只是内部健康检查
  - name: internal_poc_alpha  # POC-α 决策卡字段完整性
    our_position: not_yet_run
    target: "4 PM × 5 卡 = 20 样本；block/warn 人审一致率 >= 80%；孙总定性反馈有用"
    priority: P0
  - name: internal_poc_beta  # POC-β RD-Agent 因子准入
    our_position: not_yet_run
    target: "holdout IR(gate-approved) >= IR(raw)；拒绝率 <= 50%"
    priority: P0
  - name: internal_poc_gamma  # POC-γ 魔鬼代言人
    our_position: not_yet_run
    target: "1 个月内 5 卡跑反驳；PM 自发回看 >=1 次；至少 1 次命中真实风险"
    priority: P1
  - name: AgenticAI-Finance (aimultiple 2025)
    leaders: {FinGPT: 0.79, FinRobot: 0.74, FinRL: 0.53}
    our_position: not_applicable  # 他们测的是 LLM 金融理解，我们不做这个
  - name: FinAI Contest 2025 Task 3 (Single Stock Trading)
    our_position: not_applicable  # 违反红线 6（LLM 不做价格预测）

avoid_list:
  # 显式不做，避免 scope creep
  - train financial foundation models
  - write a new backtesting engine
  - fork any tier-1 project and diverge
  - build our own data pipeline from exchanges
  - write reasoning prompts for investor personas
  - score or rank PMs (违反红线 2/7)
  - LLM price prediction (违反红线 6)
  - push invest/ data or positions to origin (违反红线 5)
  - call it an "AI system" anywhere customer-facing (违反红线 8)
