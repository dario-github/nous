  - {name: TimesFM, url: https://github.com/google-research/timesfm, last_checked: 2026-04-21}
  - {name: Moirai, url: https://github.com/SalesforceAIResearch/uni2ts, last_checked: 2026-04-21}
  - {name: Lag-Llama, url: https://github.com/time-series-foundation-models/lag-llama, last_checked: 2026-04-21}
  - {name: TimeGPT, url: https://github.com/Nixtla/nixtla, last_checked: 2026-04-21}

benchmarks_we_want_to_beat_or_match:
  - name: AgenticAI-Finance (aimultiple 2025)
    leaders: {FinGPT: 0.79, FinRobot: 0.74, FinRL: 0.53}
    our_position: not_yet_evaluated
    target: "TradingAgents + nous 守门 >= TradingAgents raw, same spending"
  - name: FinAI Contest 2025 Task 3 (Single Stock Trading)
    our_position: not_yet_evaluated
    target: participate_only_if_poc_1_works

avoid_list:
  # 显式不做，避免 scope creep
  - train financial foundation models
  - write a new backtesting engine
  - fork any tier-1 project and diverge
  - build our own data pipeline from exchanges
  - write reasoning prompts for investor personas
